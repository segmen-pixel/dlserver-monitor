conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = false,
    draw_outline = false,
    draw_shades = true,
    default_shade_color = 'black',
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=14',
    gap_x = 40,
    gap_y = 80,
    minimum_height = 5,
    minimum_width = 600,
    no_buffers = true,
    out_to_console = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_colour = '101015',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.5,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${color cyan}── GPU 0 (RTX 3080 Ti) ──${color}
T ${execi 2 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits -i 0}°C  F ${execi 2 nvidia-smi --query-gpu=fan.speed --format=csv,noheader,nounits -i 0}%${alignr}${color #88ff88}${execigraph 2 "/usr/local/bin/gpu-stat-norm temperature.gpu 0 100" 22,280 00aa00 ff3300}${color}
U ${execi 2 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits -i 0}%${alignr}${color #4488ff}${execigraph 2 "/usr/local/bin/gpu-stat-norm utilization.gpu 0 100" 22,280 0066ff 88ddff}${color}
P ${execi 2 nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits -i 0}W /350${alignr}${color #ffaa44}${execigraph 2 "/usr/local/bin/gpu-stat-norm power.draw 0 350" 22,280 ffaa00 ff0000}${color}
M ${execi 2 nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits -i 0}/12288${alignr}${color #ff88ff}${execigraph 2 "/usr/local/bin/gpu-stat-norm memory.used 0 12288" 22,280 cc44cc ff00ff}${color}

${color cyan}── GPU 1 (RTX 3080 Ti) ──${color}
T ${execi 2 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits -i 1}°C  F ${execi 2 nvidia-smi --query-gpu=fan.speed --format=csv,noheader,nounits -i 1}%${alignr}${color #88ff88}${execigraph 2 "/usr/local/bin/gpu-stat-norm temperature.gpu 1 100" 22,280 00aa00 ff3300}${color}
U ${execi 2 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits -i 1}%${alignr}${color #4488ff}${execigraph 2 "/usr/local/bin/gpu-stat-norm utilization.gpu 1 100" 22,280 0066ff 88ddff}${color}
P ${execi 2 nvidia-smi --query-gpu=power.draw --format=csv,noheader,nounits -i 1}W /350${alignr}${color #ffaa44}${execigraph 2 "/usr/local/bin/gpu-stat-norm power.draw 1 350" 22,280 ffaa00 ff0000}${color}
M ${execi 2 nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits -i 1}/12288${alignr}${color #ff88ff}${execigraph 2 "/usr/local/bin/gpu-stat-norm memory.used 1 12288" 22,280 cc44cc ff00ff}${color}

${color orange}── CPU (i9-7900X / AIO 水冷監視) ──${color}
Pkg ${execi 2 /usr/local/bin/cpu-stat pkg}°C  Max ${execi 2 /usr/local/bin/cpu-stat max}°C${alignr}${color #ff6644}${execigraph 2 "/usr/local/bin/cpu-stat pkg" 22,280 ff6600 ff0000}${color}
Util ${cpu cpu0}%${alignr}${color #66cc66}${cpugraph cpu0 22,280 0066cc 66ff66}${color}

${color yellow}── System ──${color}
Mem ${memperc}%  Load ${loadavg 1}  Up ${uptime_short}
]]
