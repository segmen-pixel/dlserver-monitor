[Rainmeter]
Update=3000
SkinWidth=520
SkinHeight=240
DynamicWindowSize=0
AccurateText=1
OnUpdateAction=[!Move (#SCREENAREAWIDTH#-560) 30]


[Metadata]
Name=DL-SERVER (this PC) Monitor
Author=Yuki
Version=1.0

[MeasureRaw]
Measure=Plugin
Plugin=WebParser
URL=file:///C:/Users/ADSTEC/AppData/Local/Temp/dlserver-stats.txt
RegExp=(?siU)^([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),([^,]*),(.+)$
UpdateRate=1
StringIndex=0
FinishAction=[!UpdateMeasureGroup Stats][!Redraw]

[MeasureGpu0Temp]
Measure=Plugin
Plugin=WebParser
URL=[MeasureRaw]
StringIndex=1
Group=Stats
DynamicVariables=1

[MeasureGpu0Fan]
Measure=Plugin
Plugin=WebParser
URL=[MeasureRaw]
StringIndex=2
Group=Stats
DynamicVariables=1

[MeasureGpu0Util]
Measure=Plugin
Plugin=WebParser
URL=[MeasureRaw]
StringIndex=3
Group=Stats
DynamicVariables=1

[MeasureGpu0Mem]
Measure=Plugin
Plugin=WebParser
URL=[MeasureRaw]
StringIndex=4
Group=Stats
DynamicVariables=1

[MeasureGpu0Power]
Measure=Plugin
Plugin=WebParser
URL=[MeasureRaw]
StringIndex=5
Group=Stats
DynamicVariables=1

[MeasureGpu0TempNum]
Measure=Calc
Group=Stats
Formula=[MeasureGpu0Temp]
DynamicVariables=1
MinValue=0
MaxValue=100

[MeasureGpu0FanNum]
Measure=Calc
Group=Stats
Formula=[MeasureGpu0Fan]
DynamicVariables=1
MinValue=0
MaxValue=100

[MeasureGpu0UtilNum]
Measure=Calc
Group=Stats
Formula=[MeasureGpu0Util]
DynamicVariables=1
MinValue=0
MaxValue=100

[MeasureGpu0MemNum]
Measure=Calc
Group=Stats
Formula=([MeasureGpu0Mem]/24576)*100
DynamicVariables=1
MinValue=0
MaxValue=100

[MeasureGpu0PowerNum]
Measure=Calc
Group=Stats
Formula=([MeasureGpu0Power]/350)*100
DynamicVariables=1
MinValue=0
MaxValue=100

[StyleTitle]
FontFace=Segoe UI Semibold
FontSize=14
FontColor=255,180,80,255
SolidColor=0,0,0,1
AntiAlias=1
